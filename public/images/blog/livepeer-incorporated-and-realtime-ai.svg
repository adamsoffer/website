<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>
  
  <!-- Left rectangle (input frame) -->
  <rect x="200" y="170" width="260" height="180" rx="10" stroke="#40bf86" stroke-width="3" fill="none"/>
  
  <!-- Input frame inner detail — simple grid lines suggesting video -->
  <line x1="200" y1="230" x2="460" y2="230" stroke="#1e9960" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="290" x2="460" y2="290" stroke="#1e9960" stroke-width="1" opacity="0.4"/>
  <line x1="290" y1="170" x2="290" y2="350" stroke="#1e9960" stroke-width="1" opacity="0.4"/>
  <line x1="370" y1="170" x2="370" y2="350" stroke="#1e9960" stroke-width="1" opacity="0.4"/>
  
  <!-- Right rectangle (output frame) -->
  <rect x="740" y="170" width="260" height="180" rx="10" stroke="#40bf86" stroke-width="3" fill="none"/>
  
  <!-- Output frame inner detail — transformed/processed look -->
  <line x1="760" y1="210" x2="980" y2="210" stroke="#40bf86" stroke-width="1.5" opacity="0.5"/>
  <line x1="760" y1="250" x2="980" y2="250" stroke="#40bf86" stroke-width="1.5" opacity="0.5"/>
  <line x1="760" y1="290" x2="980" y2="290" stroke="#40bf86" stroke-width="1.5" opacity="0.5"/>
  <line x1="760" y1="330" x2="980" y2="330" stroke="#40bf86" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Bold arrow connecting frames -->
  <line x1="480" y1="260" x2="710" y2="260" stroke="#40bf86" stroke-width="3"/>
  <polygon points="720,260 700,248 700,272" fill="#40bf86"/>
  
  <!-- Sine wave flowing through both frames -->
  <path d="M180,440 Q240,380 300,440 Q360,500 420,440 Q480,380 540,440 Q600,500 660,440 Q720,380 780,440 Q840,500 900,440 Q960,380 1020,440" 
        stroke="#40bf86" stroke-width="3" fill="none" opacity="0.9"/>
  
  <!-- Secondary wave -->
  <path d="M180,470 Q240,420 300,470 Q360,520 420,470 Q480,420 540,470 Q600,520 660,470 Q720,420 780,470 Q840,520 900,470 Q960,420 1020,470" 
        stroke="#1e9960" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Processing indicator dots on arrow -->
  <circle cx="540" cy="260" r="4" fill="#40bf86" opacity="0.8"/>
  <circle cx="570" cy="260" r="4" fill="#1e9960" opacity="0.8"/>
  <circle cx="600" cy="260" r="4" fill="#40bf86" opacity="0.8"/>
  <circle cx="630" cy="260" r="4" fill="#1e9960" opacity="0.8"/>
  <circle cx="660" cy="260" r="4" fill="#40bf86" opacity="0.8"/>
</svg>
