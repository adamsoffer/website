<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>
  
  <!-- Subtle grid -->
  <line x1="200" y1="120" x2="200" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="120" x2="350" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="120" x2="500" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="650" y1="120" x2="650" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="800" y1="120" x2="800" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="950" y1="120" x2="950" y2="560" stroke="#333" stroke-width="1" opacity="0.5"/>
  
  <line x1="150" y1="180" x2="1000" y2="180" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="270" x2="1000" y2="270" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="360" x2="1000" y2="360" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="450" x2="1000" y2="450" stroke="#333" stroke-width="1" opacity="0.5"/>
  
  <!-- Axes -->
  <line x1="200" y1="540" x2="980" y2="540" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="540" x2="200" y2="130" stroke="#555" stroke-width="1.5"/>
  
  <!-- Bold ascending curve -->
  <path d="M200,500 C300,490 400,470 500,420 C600,360 700,270 800,190 C860,155 920,135 970,120" 
        stroke="#40bf86" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Area fill under curve -->
  <path d="M200,500 C300,490 400,470 500,420 C600,360 700,270 800,190 C860,155 920,135 970,120 L970,540 L200,540 Z" 
        fill="#40bf86" fill-opacity="0.06"/>
  
  <!-- Milestone dots along the curve -->
  <circle cx="350" cy="478" r="7" fill="#1c1c1c" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="350" cy="478" r="3" fill="#40bf86"/>
  
  <circle cx="500" cy="420" r="7" fill="#1c1c1c" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="500" cy="420" r="3" fill="#40bf86"/>
  
  <circle cx="650" cy="320" r="7" fill="#1c1c1c" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="650" cy="320" r="3" fill="#40bf86"/>
  
  <circle cx="800" cy="190" r="7" fill="#1c1c1c" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="800" cy="190" r="3" fill="#40bf86"/>
  
  <circle cx="950" cy="125" r="8" fill="#1c1c1c" stroke="#40bf86" stroke-width="3"/>
  <circle cx="950" cy="125" r="4" fill="#40bf86"/>
  
  <!-- Vertical dashed lines from milestones to axis -->
  <line x1="350" y1="478" x2="350" y2="540" stroke="#1e9960" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="500" y1="420" x2="500" y2="540" stroke="#1e9960" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="650" y1="320" x2="650" y2="540" stroke="#1e9960" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="800" y1="190" x2="800" y2="540" stroke="#1e9960" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="950" y1="125" x2="950" y2="540" stroke="#1e9960" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
</svg>
