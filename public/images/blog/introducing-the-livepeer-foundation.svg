<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>

  <g transform="translate(0, 48)">
  <!-- Central hexagon -->
  <polygon points="600,180 692,232 692,337 600,390 508,337 508,232" stroke="#40bf86" stroke-width="3.5" fill="none"/>
  
  <!-- Inner hexagon -->
  <polygon points="600,240 646,263 646,310 600,333 554,310 554,263" stroke="#1e9960" stroke-width="2.5" fill="#1e9960" fill-opacity="0.15"/>
  
  <!-- Radiating lines from vertices -->
  <!-- Top vertex -->
  <line x1="600" y1="180" x2="600" y2="80" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="600" cy="72" r="8" stroke="#40bf86" stroke-width="2" fill="none"/>
  
  <!-- Top-right vertex -->
  <line x1="692" y1="232" x2="772" y2="186" stroke="#40bf86" stroke-width="2.5"/>
  <rect x="772" y="176" width="16" height="16" stroke="#40bf86" stroke-width="2" fill="none" transform="rotate(45 780 184)"/>
  
  <!-- Bottom-right vertex -->
  <line x1="692" y1="337" x2="772" y2="383" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="780" cy="390" r="8" stroke="#40bf86" stroke-width="2" fill="none"/>
  
  <!-- Bottom vertex -->
  <line x1="600" y1="390" x2="600" y2="490" stroke="#40bf86" stroke-width="2.5"/>
  <polygon points="600,506 592,490 608,490" stroke="#40bf86" stroke-width="2" fill="none"/>
  
  <!-- Bottom-left vertex -->
  <line x1="508" y1="337" x2="428" y2="383" stroke="#40bf86" stroke-width="2.5"/>
  <rect x="412" y="376" width="16" height="16" stroke="#40bf86" stroke-width="2" fill="none" transform="rotate(45 420 384)"/>
  
  <!-- Top-left vertex -->
  <line x1="508" y1="232" x2="428" y2="186" stroke="#40bf86" stroke-width="2.5"/>
  <circle cx="420" cy="180" r="8" stroke="#40bf86" stroke-width="2" fill="none"/>
  
  <!-- Secondary structural lines -->
  <line x1="600" y1="72" x2="540" y2="40" stroke="#1e9960" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="72" x2="660" y2="40" stroke="#1e9960" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="506" x2="540" y2="540" stroke="#1e9960" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="506" x2="660" y2="540" stroke="#1e9960" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Cross-structural lines through center -->
  <line x1="420" y1="180" x2="780" y2="390" stroke="#18794E" stroke-width="1" opacity="0.4"/>
  <line x1="780" y1="184" x2="420" y2="384" stroke="#18794E" stroke-width="1" opacity="0.4"/>
  
  <!-- Center dot -->
  <circle cx="600" cy="285" r="5" fill="#40bf86"/>
  </g>
</svg>
