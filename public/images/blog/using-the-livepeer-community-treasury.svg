<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>

  <g transform="translate(0, 100)">
    <!-- Central vault/treasury shape -->
    <rect x="500" y="160" width="200" height="180" rx="8" stroke="#40bf86" stroke-width="3" fill="none"/>
    <rect x="520" y="180" width="160" height="140" rx="4" stroke="#1e9960" stroke-width="2" fill="#1e9960" fill-opacity="0.08"/>

    <!-- Vault door circle -->
    <circle cx="600" cy="260" r="45" stroke="#40bf86" stroke-width="2.5" fill="none"/>
    <circle cx="600" cy="260" r="30" stroke="#1e9960" stroke-width="1.5" fill="#1e9960" fill-opacity="0.15"/>
    <circle cx="600" cy="260" r="8" fill="#40bf86" fill-opacity="0.6"/>

    <!-- Vault handle -->
    <line x1="600" y1="230" x2="600" y2="215" stroke="#40bf86" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="585" y1="260" x2="570" y2="260" stroke="#40bf86" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="615" y1="260" x2="630" y2="260" stroke="#40bf86" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="600" y1="290" x2="600" y2="305" stroke="#40bf86" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Columns left -->
    <rect x="340" y="180" width="20" height="160" rx="3" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.6"/>
    <rect x="380" y="200" width="16" height="120" rx="3" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Columns right -->
    <rect x="840" y="180" width="20" height="160" rx="3" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.6"/>
    <rect x="804" y="200" width="16" height="120" rx="3" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Pediment / roof -->
    <polygon points="320,170 600,90 880,170" stroke="#40bf86" stroke-width="2" fill="none"/>
    <polygon points="380,170 600,110 820,170" stroke="#1e9960" stroke-width="1" fill="#1e9960" fill-opacity="0.06"/>

    <!-- Base platform -->
    <line x1="300" y1="350" x2="900" y2="350" stroke="#40bf86" stroke-width="2"/>
    <line x1="320" y1="365" x2="880" y2="365" stroke="#1e9960" stroke-width="1" opacity="0.5"/>
    <line x1="340" y1="378" x2="860" y2="378" stroke="#1e9960" stroke-width="1" opacity="0.3"/>

    <!-- Floating token shapes -->
    <circle cx="280" cy="130" r="14" stroke="#40bf86" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="280" cy="130" r="6" fill="#1e9960" fill-opacity="0.3"/>

    <circle cx="920" cy="140" r="12" stroke="#40bf86" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="920" cy="140" r="5" fill="#1e9960" fill-opacity="0.3"/>

    <circle cx="240" cy="320" r="10" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="960" cy="300" r="10" stroke="#1e9960" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Arrow paths from tokens to vault -->
    <path d="M294,130 Q400,130 500,200" stroke="#18794E" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M906,140 Q800,140 700,200" stroke="#18794E" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Subtle grid lines -->
    <line x1="600" y1="50" x2="600" y2="80" stroke="#333" stroke-width="1" opacity="0.3"/>
    <line x1="600" y1="390" x2="600" y2="420" stroke="#333" stroke-width="1" opacity="0.3"/>
  </g>
</svg>