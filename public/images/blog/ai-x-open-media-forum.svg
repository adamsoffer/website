<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>
  
  <!-- Left circle (AI) -->
  <circle cx="500" cy="337" r="180" stroke="#40bf86" stroke-width="3" fill="none"/>
  
  <!-- Right circle (Media) -->
  <circle cx="700" cy="337" r="180" stroke="#40bf86" stroke-width="3" fill="none"/>
  
  <!-- Intersection highlight — vesica piscis shape -->
  <clipPath id="clipLeft">
    <circle cx="500" cy="337" r="180"/>
  </clipPath>
  <clipPath id="clipRight">
    <circle cx="700" cy="337" r="180"/>
  </clipPath>
  
  <!-- Fill the intersection -->
  <circle cx="700" cy="337" r="180" fill="#40bf86" fill-opacity="0.12" clip-path="url(#clipLeft)"/>
  
  <!-- Intersection border emphasis -->
  <!-- Upper intersection arc -->
  <path d="M600,178 A180,180 0 0,1 600,496" stroke="#40bf86" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M600,178 A180,180 0 0,0 600,496" stroke="#40bf86" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Center point of intersection -->
  <circle cx="600" cy="337" r="6" fill="#40bf86"/>
  
  <!-- Subtle inner rings in each circle -->
  <circle cx="500" cy="337" r="130" stroke="#1e9960" stroke-width="1" opacity="0.3"/>
  <circle cx="700" cy="337" r="130" stroke="#1e9960" stroke-width="1" opacity="0.3"/>
  
  <!-- Small accent marks at the intersection crossing points -->
  <circle cx="600" cy="178" r="5" fill="#1c1c1c" stroke="#40bf86" stroke-width="2"/>
  <circle cx="600" cy="496" r="5" fill="#1c1c1c" stroke="#40bf86" stroke-width="2"/>
</svg>
