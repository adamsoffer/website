<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1c1c1c"/>
  <rect x="20" y="20" width="1160" height="635" rx="12" stroke="#333" stroke-width="1" fill="none"/>

  <g transform="translate(0, 40)">
  <!-- Stacked building blocks — isometric-ish stepped arrangement -->
  
  <!-- Bottom row — 3 blocks -->
  <rect x="340" y="400" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="2.5" fill="#1e9960" fill-opacity="0.1"/>
  <rect x="500" y="400" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="2.5" fill="#1e9960" fill-opacity="0.1"/>
  <rect x="660" y="400" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="2.5" fill="#1e9960" fill-opacity="0.1"/>
  
  <!-- Second row — 2 blocks -->
  <rect x="420" y="300" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="2.5" fill="#1e9960" fill-opacity="0.15"/>
  <rect x="580" y="300" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="2.5" fill="#1e9960" fill-opacity="0.15"/>
  
  <!-- Third row — 1 block -->
  <rect x="500" y="200" width="140" height="80" rx="4" stroke="#40bf86" stroke-width="3" fill="#40bf86" fill-opacity="0.12"/>
  
  <!-- Top block being placed (slightly offset, suggesting construction) -->
  <rect x="506" y="120" width="130" height="60" rx="4" stroke="#40bf86" stroke-width="2.5" fill="none" stroke-dasharray="8 4" opacity="0.7"/>
  
  <!-- Downward placement arrow -->
  <line x1="571" y1="95" x2="571" y2="115" stroke="#40bf86" stroke-width="2" opacity="0.7"/>
  <polygon points="571,118 565,108 577,108" fill="#40bf86" opacity="0.7"/>
  
  <!-- Connection lines between blocks (vertical) -->
  <line x1="490" y1="400" x2="490" y2="380" stroke="#1e9960" stroke-width="1.5" opacity="0.5"/>
  <line x1="650" y1="400" x2="650" y2="380" stroke="#1e9960" stroke-width="1.5" opacity="0.5"/>
  <line x1="570" y1="300" x2="570" y2="280" stroke="#1e9960" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Small accent dots at block corners -->
  <circle cx="340" cy="400" r="3" fill="#40bf86" opacity="0.6"/>
  <circle cx="800" cy="400" r="3" fill="#40bf86" opacity="0.6"/>
  <circle cx="340" cy="480" r="3" fill="#40bf86" opacity="0.6"/>
  <circle cx="800" cy="480" r="3" fill="#40bf86" opacity="0.6"/>
  <circle cx="500" cy="200" r="3" fill="#40bf86" opacity="0.6"/>
  <circle cx="640" cy="200" r="3" fill="#40bf86" opacity="0.6"/>
  
  <!-- Ground line -->
  <line x1="280" y1="500" x2="860" y2="500" stroke="#1e9960" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
